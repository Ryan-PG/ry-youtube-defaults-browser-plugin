<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Default Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <img src="icons/icon48.png" alt="" class="brand-icon" />
      <h1 data-i18n="app_title">Ry-YouTube Defaults</h1>
    </div>

    <div class="header-controls">
      <div class="lang-switch" role="group" aria-label="Language">
        <button type="button" id="langFa" class="lang-btn" data-lang="fa">FA</button>
        <button type="button" id="langEn" class="lang-btn" data-lang="en">EN</button>
      </div>
      <label class="switch" data-i18n-title="toggle_hint">
        <input type="checkbox" id="enabledToggle" />
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <main id="main">
    <!-- Videos section -->
    <section class="card">
      <div class="card-title">
        <span class="dot dot-video"></span>
        <span data-i18n="card_video">Videos</span>
        <code>youtube.com/watch</code>
      </div>

      <div class="field">
        <label for="videoQuality" data-i18n="field_quality">Default quality</label>
        <select id="videoQuality" class="select"></select>
      </div>

      <div class="field">
        <label for="videoSpeedPreset" data-i18n="field_speed">Default speed</label>
        <select id="videoSpeedPreset" class="select"></select>
      </div>

      <div class="field custom-speed" id="videoCustomWrap" hidden>
        <label for="videoSpeedCustom" data-i18n="field_custom_speed">Custom speed</label>
        <input type="number" id="videoSpeedCustom" class="input" min="0.07" max="16" step="0.05" data-i18n-placeholder="custom_placeholder" />
      </div>
    </section>

    <!-- Shorts section -->
    <section class="card">
      <div class="card-title">
        <span class="dot dot-shorts"></span>
        <span data-i18n="card_shorts">Shorts</span>
        <code>youtube.com/shorts</code>
      </div>

      <div class="field">
        <label for="shortsQuality" data-i18n="field_quality">Default quality</label>
        <select id="shortsQuality" class="select"></select>
      </div>

      <div class="field">
        <label for="shortsSpeedPreset" data-i18n="field_speed">Default speed</label>
        <select id="shortsSpeedPreset" class="select"></select>
      </div>

      <div class="field custom-speed" id="shortsCustomWrap" hidden>
        <label for="shortsSpeedCustom" data-i18n="field_custom_speed">Custom speed</label>
        <input type="number" id="shortsSpeedCustom" class="input" min="0.07" max="16" step="0.05" data-i18n-placeholder="custom_placeholder" />
      </div>
    </section>

    <div class="actions">
      <button id="saveBtn" class="btn btn-primary" data-i18n="btn_save">Save</button>
      <span id="status" class="status"></span>
    </div>

    <p class="hint" data-i18n="hint">
      If the selected quality isn't available in the video menu, the extension won't change quality.
    </p>
  </main>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
